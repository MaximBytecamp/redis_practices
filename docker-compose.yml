services:
  redis:
    image: redis:7-alpine
    container_name: redis_practice
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s 
      retries: 5


  app:
    build: .
    container_name: fastapi_practice
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped


volumes:
  redis_data:

